name: Generate update PR for the Dynamic Plugins tables

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the script from"
        required: true
        default: "main"
  # Weekly: Monday 04:00 UTC (~ Sunday 11pm Eastern / 8pm Pacific). Scheduled workflows use the default branch YAML.
  schedule:
    - cron: "0 4 * * 5"

jobs:
  run-script:
    runs-on: ubuntu-latest
    # On schedule, run every listed branch. On manual runs, only run for the branch that matches the selected input.
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && matrix.target_branch == github.event.inputs.branch)
    strategy:
      fail-fast: false
      matrix:
        include:
          # Add or remove rows when release branches change. Job can only run for branches listed here.
          - target_branch: main
            script_path: modules/extend_dynamic-plugins-reference/rhdh-supported-plugins.sh
          - target_branch: release-1.8
            script_path: modules/dynamic-plugins-reference/rhdh-supported-plugins.sh
          - target_branch: release-1.9
            script_path: modules/extend_dynamic-plugins-reference/rhdh-supported-plugins.sh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.target_branch }}
          fetch-depth: 0

      - name: Install PIP `yq`
        run: |
          python3 -m pip install --upgrade pip
          pip install yq
          echo "Installed `yq` version: $(yq --version)"

      - name: Set up Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate timestamp
        run: echo "TIMESTAMP=$(date +'%Y%m%d-%H%M%S' -u)" >> $GITHUB_ENV

      - name: Run the script on branch
        run: bash ${{ matrix.script_path }} -b ${{ matrix.target_branch }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: automated update of supported plugins list"
          title: "Automated update of supported plugins list for ${{ matrix.target_branch }}"
          body: "This PR was automatically generated by running rhdh-supported-plugins.sh."
          branch: "update-${{ matrix.target_branch }}-${{ env.TIMESTAMP }}"
          base: ${{ matrix.target_branch }}
